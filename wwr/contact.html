<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="learn about our rafting company, our history, and why we are passionate about providing unforgettable river adventures. Join us on the water!">
    <meta name="author" content="Ibekwe Chidera">
    <link rel="stylesheet" href="styles/rafting.css">
    <title>Contact Us - White Water Fun </title>
</head>

<body>
    <header>
        <img src="images/logo.jpeg" alt="company logo image">
        <nav>

            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <div class="contact-info">
            <h1>White Water Fun</h1>
            <p>123 Main Street, Anytown, USA</p>
            <p>Phone: (123) 456-7890</p>
            <p>Email: info@whitewaterfun.com</p>
        </div>

        <section>
            <div class="contact-area">
                <div class="map-area">
                    <iframe
                      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3151.835434509374!2d144.9537363153169!3d-37.81627977975195!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad642af0f11fd81%3A0xf577d9a651c8e7a!2sEnvato%20Pty%20Ltd!5e0!3m2!1sen!2sau!4v1600000000000"
                      allowfullscreen="" aria-hidden="false" tabindex="0"></iframe>
                </div>


                <form>
                    <label for="name">Name:
                        <input type="text" id="name" name="name" required placeholder="Placeholder">
                    </label>

                    <label for="email">Email:
                        <input type="email" id="email" name="email" required
                          placeholder="Placeholder">
                    </label>

                    <div class="check-info">

                        <h3>Message Purpose:</h3>
                        <label for="general"><input type="radio" name="message" id="general">
                            General
                        </label>
                        <label for="reservation"><input type="radio" name="message"
                              id="reservation">
                            Reservation
                        </label>
                        <label for="website"><input type="radio" name="message" id="website">
                            Website
                        </label>

                    </div>

                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required
                      placeholder="Type here"></textarea>

                    <label for="message-purpose">
                        <input type="checkbox" id="message-purpose" name="message-purpose" required>
                        Subscribe to newsletter
                    </label>

                    <button type="submit">Get in to Touch</button>
                </form>
            </div>
        </section>

        <section>
            <h2>We Are Here To Serve You</h2>

            <div class="employee-area">
                <figure>
                    <img src="images/add-pic1.jpg" alt=" image Smith dan">
                    <figcaption>Smith dan</figcaption>
                </figure>
                <figure>
                    <img src="images/add-pic2.jpg" alt=" image Jane Doe">
                    <figcaption>Jane Doe</figcaption>
                </figure>
                <figure>
                    <img src="images/add-pic3.jpg" alt="John Smith">
                    <figcaption>John Smith</figcaption>
                </figure>

            </div>
        </section>
    </main>
    <footer>
        <p> &copy; 2026 | White Water Fun | Ibekwe Chidera</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook-svgrepo-com.svg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin-color-svgrepo-com.svg" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram-1-svgrepo-com.svg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>

</body>

</html>
